<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caritas Mobile – Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #b10017;
      --red-dark: #8f0012;
      --red-glow: rgba(177, 0, 23, 0.07);
      --green: #5c7830;
      --green-light: rgba(92, 120, 48, 0.09);
      --cream: #faf7f2;
      --warm-white: #fffdf9;
      --text: #2c2218;
      --text-secondary: rgba(44, 34, 24, 0.58);
      --text-muted: rgba(44, 34, 24, 0.36);
      --border: rgba(44, 34, 24, 0.09);
      --shadow: 0 4px 24px rgba(44, 34, 24, 0.06);
      --shadow-lg: 0 12px 40px rgba(44, 34, 24, 0.09);
      --radius: 20px;
      --radius-sm: 14px;
      --radius-pill: 999px;
      --phone-w: 420px;
      --font-display: 'Lora', Georgia, serif;
      --font-body: 'Nunito', -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--cream);
      min-height: 100vh;
      padding: 20px;
    }

    a { color: inherit; text-decoration: none; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 40px;
      margin: 0 auto 14px;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: white;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: var(--shadow);
    }

    .workspace { width: min(var(--phone-w), 100%); margin: 0 auto; }

    .phone {
      width: 100%;
      padding: 12px;
      background: #1a1814;
      border-radius: 44px;
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .screen {
      min-height: 760px;
      border-radius: 32px;
      overflow: hidden;
      background: var(--warm-white);
      position: relative;
    }

    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 2;
      border-radius: inherit;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    .content {
      padding: 0 20px 32px;
      position: relative;
      z-index: 1;
    }

    /* ── top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0 0;
    }

    .hamburger {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .hamburger:active { background: var(--cream); }

    .hamburger-lines {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 18px;
    }

    .hamburger-lines span {
      display: block;
      height: 2px;
      border-radius: 1px;
      background: var(--text);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      color: white;
      font-weight: 800;
      font-size: 0.82rem;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(177, 0, 23, 0.2);
    }

    /* ── dropdown ── */
    .dropdown {
      display: none;
      position: absolute;
      top: 52px;
      left: 0;
      width: 220px;
      padding: 8px;
      border-radius: var(--radius-sm);
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      z-index: 10;
    }

    .dropdown.open { display: block; }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }

    .dropdown-item:hover { background: var(--cream); }
    .dropdown-item svg { flex-shrink: 0; color: var(--text-muted); }

    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 8px; }

    .dropdown-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9;
    }

    .dropdown-backdrop.open { display: block; }

    /* ── greeting ── */
    .greeting { padding: 14px 0 0; }

    .greeting-label {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .greeting-name {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--red);
      line-height: 1.05;
      margin-top: 2px;
    }

    .greeting-village {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── unified nav list ── */
    .nav-list {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 16px 16px 14px;
      border-radius: var(--radius);
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:active { transform: scale(0.98); }

    .nav-item-primary {
      background: linear-gradient(135deg, #b10017 0%, #8f0012 100%);
      color: white;
      border: none;
      box-shadow: 0 6px 24px rgba(177, 0, 23, 0.2);
    }

    .nav-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .nav-icon-red { background: var(--red-glow); color: var(--red); }
    .nav-icon-green { background: var(--green-light); color: var(--green); }
    .nav-icon-purple { background: rgba(109, 76, 155, 0.1); color: #6d4c9b; }
    .nav-icon-teal { background: rgba(45, 125, 154, 0.1); color: #2d7d9a; }
    .nav-icon-orange { background: rgba(194, 120, 40, 0.1); color: #c27828; }

    .nav-item-primary .nav-icon {
      background: rgba(255, 255, 255, 0.14);
      color: white;
    }

    .nav-body {
      flex: 1;
      min-width: 0;
    }

    .nav-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .nav-desc {
      margin-top: 2px;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .nav-item-primary .nav-desc { color: rgba(255, 255, 255, 0.72); }
    .nav-desc { color: var(--text-secondary); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    .nav-item-primary .nav-arrow { background: rgba(255, 255, 255, 0.12); }
    .nav-arrow { background: rgba(44, 34, 24, 0.05); color: var(--text-muted); }

    .wip-badge {
      padding: 4px 8px;
      border-radius: var(--radius-pill);
      background: rgba(44, 34, 24, 0.06);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── leaf deco ── */
    .leaf-deco {
      position: absolute;
      top: 40px;
      right: -10px;
      width: 120px;
      height: 120px;
      opacity: 0.06;
      z-index: 0;
      pointer-events: none;
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .anim { animation: fadeUp 0.4s ease-out both; }
    .anim-1 { animation-delay: 0.04s; }
    .anim-2 { animation-delay: 0.08s; }
    .anim-3 { animation-delay: 0.12s; }
    .anim-4 { animation-delay: 0.16s; }
    .anim-5 { animation-delay: 0.20s; }
    .anim-6 { animation-delay: 0.24s; }
    .anim-7 { animation-delay: 0.28s; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← Back to index</a>

          <nav class="nav-list">

                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>

              </div>

            <a class="nav-item anim anim-4" href="planning.html">
              <div class="nav-icon nav-icon-green">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

            <div class="nav-item anim anim-5">
              <div class="nav-icon nav-icon-purple">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>

    </section>
  </main>

  <script>
    var btn = document.getElementById('menuBtn');
    var dropdown = document.getElementById('menuDropdown');
    var backdrop = document.getElementById('menuBackdrop');

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.classList.toggle('open');
      backdrop.classList.toggle('open');
    });

    backdrop.addEventListener('click', function() {
      dropdown.classList.remove('open');
      backdrop.classList.remove('open');
    });

    dropdown.addEventListener('click', function(e) { e.stopPropagation(); });
  </script>
</body>
</html>
